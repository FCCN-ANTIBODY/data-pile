name: "Test · core"

# Exercises the crypto + verification core end to end. Unlike a constrained dev box,
# ubuntu-latest ships ssh-keygen, so the signature path (sign + verify + wrong-key
# rejection) runs for real here.

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install age
        run: sudo apt-get update && sudo apt-get install -y age
      - name: Clone anecdote.channel (the ssh-sig verifier the feed-open leg injects)
        # Branch-matching like the constellation's other cross-repo consumers; fall back to main.
        # Absent entirely, the feed-open test still runs — its signature leg degrades, stated.
        run: |
          ref="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          git clone --depth 1 --branch "$ref" https://github.com/FCCN-ANTIBODY/anecdote.channel ../anecdote.channel \
            || git clone --depth 1 https://github.com/FCCN-ANTIBODY/anecdote.channel ../anecdote.channel
      - name: Run the suite
        run: bash test/run.sh
