name: prune

# The pile's OWN feed-history cleanup, on the pile's OWN budget (it is not a glove). Archives
# each feed/<src> branch's intact chain to archive/feed/<src>@<stamp> and resets the live ref to a
# lean snapshot. Never rewrites commits in place; producers continue from the new head.

on:
  schedule:
    - cron: "17 4 1 * *" # 04:17 UTC on the 1st of each month (best-effort)
  workflow_dispatch:
    inputs:
      keep_days:
        description: "Archive+reset feed branches whose newest commit is older than N days"
        default: "60"

permissions:
  contents: write

concurrency:
  group: prune
  cancel-in-progress: false

jobs:
  prune:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Archive and reset old feed branches
        run: |
          git config user.name  "data-pile-prune"
          git config user.email "data-pile-prune@users.noreply.github.com"
          bin/prune --keep-days "${{ github.event.inputs.keep_days || '60' }}"
