name: ingest

# Scheduled governor. Per source (each Tell you joined, plus the direct path): fetch the
# feed, verify it cryptographically, decrypt, and run the acceptance governor against each
# question's guidance. The durable output is the verdict ledger (state/<src>/ledger.json) —
# verdicts + hashes, NO plaintext — force-committed to main as the pile's reviewable record.
#
# This job is secret-bearing by design (the user's "automated accept on cron" choice): it
# holds PILE_AGE_IDENTITY to decrypt. Tradeoff: the identity is exercised in CI. Owners who
# prefer to keep the key off CI can drop the secret — ingest then does a keyless crypto audit
# (verify only) — and run `bin/ingest` locally to govern.

on:
  schedule:
    - cron: "23 * * * *" # hourly, best-effort
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install age
        run: sudo apt-get update && sudo apt-get install -y age
      - name: Verify, decrypt, govern
        env:
          PILE_AGE_IDENTITY: ${{ secrets.PILE_AGE_IDENTITY }}
        run: bin/ingest
      - name: Publish the verdict ledgers (no plaintext)
        run: |
          set -euo pipefail
          git add -f state/*/ledger.json 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git config user.name  "data-pile-ingest"
            git config user.email "data-pile-ingest@users.noreply.github.com"
            git commit -m "ingest: refresh verdict ledger $(date -u +%FT%TZ)"
            git push
          else
            echo "no ledger changes"
          fi
      - name: Surface results
        if: always()
        run: |
          { echo '## Ingest results'; echo '```'; \
            for f in state/*/ingested.log; do [ -f "$f" ] && { echo "$f:"; tail -n 3 "$f"; }; done; \
            echo '```'; } >> "$GITHUB_STEP_SUMMARY"
