name: "Publish · reports"

# Build reports from verified state and publish them to reports/ on main. Aggregation is a
# documented stub (see bin/report and AGENTS.md) — this publishes the generic summary with
# the signed manifest digest as provenance. Define your own aggregation in bin/report.

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC — a weekly "deadline", mirroring civic-node
  workflow_dispatch:

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install age
        run: sudo apt-get update && sudo apt-get install -y age
      - name: Refresh verified state, then build reports
        run: |
          bin/ingest      # verify feeds -> state/ (state/ is gitignored; rebuilt each run)
          bin/report
      - name: Publish if changed
        run: |
          set -euo pipefail
          if [ -n "$(git status --porcelain reports/)" ]; then
            git config user.name "data-pile-report"
            git config user.email "data-pile-report@users.noreply.github.com"
            git add reports/
            git commit -m "report: refresh $(date -u +%FT%TZ)"
            git push
          else
            echo "no report changes"
          fi
