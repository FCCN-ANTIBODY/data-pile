name: "Federate · prove"

# Owner opt-in: go public from a chosen checkpoint. Derives K_N from the seed and commits
# the proof bundle to reports/ on main. Publishing it lets anyone decrypt blocks seq>=N and
# confirm they match the signed manifest. Forward-only: blocks before N stay sealed.

on:
  workflow_dispatch:
    inputs:
      source:
        description: "Feed source"
        default: tell
      from_seq:
        description: "Disclose from this seq onward (0 = whole history)"
        required: true

permissions:
  contents: write

jobs:
  prove:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install age
        run: sudo apt-get update && sudo apt-get install -y age
      - name: Fetch the feed and emit the proof bundle
        env:
          PILE_AGE_IDENTITY: ${{ secrets.PILE_AGE_IDENTITY }}
          SRC: ${{ inputs.source }}
          FROM: ${{ inputs.from_seq }}
        run: |
          set -euo pipefail
          [ -n "${PILE_AGE_IDENTITY:-}" ] || { echo "::error::PILE_AGE_IDENTITY secret required"; exit 1; }
          branch="$(awk -v s="$SRC" '$1=="-"&&$2=="name:"{c=$3} c==s&&$1=="branch:"{print $2;exit}' pile.yml)"
          git fetch --quiet origin "$branch"
          work="$(mktemp -d)"
          git --work-tree="$work" checkout FETCH_HEAD -- inbox; git reset --quiet -- inbox
          bin/prove --dir "$work" --source "$SRC" --from "$FROM"
          mkdir -p reports
          cp "$work"/reports/proof-*.json reports/
          git config user.name "data-pile-prove"
          git config user.email "data-pile-prove@users.noreply.github.com"
          git add reports/proof-*.json
          git commit -m "prove: publish ${SRC} checkpoint from seq ${FROM}"
          git push
