name: "Federate · handshake"

# A descendent of the constellation's registration paradigm, whose cleanest/canonical form
# is the Tell's bin/register (a Tell registering with an Atlas). See "B. Registration validation
# and idiom unification" in civic-node's OPEN-QUESTIONS.md.
#
# Owner-initiated registration with Tell. Opens a PR on tell.anecdote.channel adding
# this pile's entry to _data/piles.yml — the consent signal. The entry tells Tell the
# pile's age_recipient (so it can wrap each digest's ratchet seed for the owner) and the
# chain location. When Tell accepts, it begins publishing the encrypted feed at
# /piles/<id>/feed/* in its OWN served tree (plain static files); this pile PULLS it via ingest.yml.
#
# There is NO GitHub App and NO write grant to Tell. Trust runs the other way: the pile
# pins Tell's published delivery-signer fingerprint (tell.anecdote.channel/keys/tell.fpr)
# into pile.yml `signer` + keys/tell.signers, BY HAND, confirmed out-of-band / IRL.
#
# Cross-repo: needs a fine-grained PAT (TELL_PR_TOKEN) with Contents+PR write on
# FCCN-ANTIBODY/tell.anecdote.channel. Without it, the job prints the entry to paste by hand.

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  TELL_REPO: FCCN-ANTIBODY/tell.anecdote.channel

jobs:
  handshake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assemble registration entry
        id: entry
        run: |
          set -euo pipefail
          id="$(awk '$1=="id:"{gsub(/[\"]/,"",$2);print $2}' pile.yml)"
          scope="$(awk '$1=="scope:"{gsub(/[\"]/,"",$2);print $2}' pile.yml)"
          recip="$(cat keys/pile.age.pub)"
          prov="$(awk '$1=="provisioner:"{gsub(/[\"]/,"",$2);print $2}' pile.yml)"
          provspec="$(awk '$1=="provisioner_spec:"{gsub(/[\"]/,"",$2);print $2}' pile.yml)"
          {
            echo "- id: ${id}"
            echo "  scope: ${scope}"
            echo "  age_recipient: \"${recip}\""
            echo "  repo_url: https://github.com/${GITHUB_REPOSITORY}"
            # the provisioner attestation travels with the entry (CONTRACT.md → spec-or-attested)
            if [ -n "${prov}" ]; then echo "  provisioner: \"${prov}\""; fi
            if [ -n "${provspec}" ]; then echo "  provisioner_spec: \"${provspec}\""; fi
          } | tee entry.yml
      - name: Open registration PR on Tell (or print to paste)
        env:
          GH_TOKEN: ${{ secrets.TELL_PR_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::warning::No TELL_PR_TOKEN — paste entry.yml into ${TELL_REPO}/_data/piles.yml yourself:"
            cat entry.yml; exit 0
          fi
          sudo apt-get update && sudo apt-get install -y gh
          br="handshake/${GITHUB_REPOSITORY##*/}"
          tmp="$(mktemp -d)"; cd "$tmp"
          gh repo clone "$TELL_REPO" tell -- --depth 1
          cd tell; git switch -c "$br"
          cat "$GITHUB_WORKSPACE/entry.yml" >> _data/piles.yml
          git config user.name "data-pile-handshake"
          git config user.email "data-pile-handshake@users.noreply.github.com"
          git add _data/piles.yml
          git commit -m "register pile ${GITHUB_REPOSITORY}"
          git push -u origin "$br"
          gh pr create --title "Register pile ${GITHUB_REPOSITORY}" \
            --body "Handshake: requesting aggregation. Tell will publish this pile's encrypted feed at /piles/<id>/feed/*; the pile pulls + verifies it. No write access to this repo is requested." \
            --base main --head "$br"
