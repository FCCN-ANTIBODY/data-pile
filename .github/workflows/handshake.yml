name: handshake

# Owner-initiated registration with Atlas. Opens a PR on atlas.anecdote.channel adding
# this pile's entry to _data/piles.yml — the consent signal. When Atlas accepts, it
# installs its delivery channel (a GitHub App scoped to this repo's feed/** + Issues) and
# opens a provisioning Issue back here.
#
# Cross-repo: needs a fine-grained PAT (ATLAS_PR_TOKEN) with Contents+PR write on
# FCCN-ANTIBODY/atlas.anecdote.channel. Without it, the job prints the entry to paste by hand.

on:
  workflow_dispatch:
    inputs:
      signer:
        description: "Atlas-side signer fingerprint to register (SHA256:...)"
        required: true

permissions:
  contents: read

env:
  ATLAS_REPO: FCCN-ANTIBODY/atlas.anecdote.channel

jobs:
  handshake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assemble registration entry
        id: entry
        run: |
          set -euo pipefail
          id="$(awk '$1=="id:"{gsub(/[\"]/,"",$2);print $2}' pile.yml)"
          scope="$(awk '$1=="scope:"{gsub(/[\"]/,"",$2);print $2}' pile.yml)"
          recip="$(cat keys/pile.age.pub)"
          {
            echo "- id: ${id}"
            echo "  scope: ${scope}"
            echo "  feed: feed/atlas"
            echo "  signer: \"${{ inputs.signer }}\""
            echo "  age_recipient: \"${recip}\""
            echo "  repo_url: https://github.com/${GITHUB_REPOSITORY}"
          } | tee entry.yml
      - name: Open registration PR on Atlas (or print to paste)
        env:
          GH_TOKEN: ${{ secrets.ATLAS_PR_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::warning::No ATLAS_PR_TOKEN — paste entry.yml into ${ATLAS_REPO}/_data/piles.yml yourself:"
            cat entry.yml; exit 0
          fi
          sudo apt-get update && sudo apt-get install -y gh
          br="handshake/${GITHUB_REPOSITORY##*/}"
          tmp="$(mktemp -d)"; cd "$tmp"
          gh repo clone "$ATLAS_REPO" atlas -- --depth 1
          cd atlas; git switch -c "$br"
          cat "$GITHUB_WORKSPACE/entry.yml" >> _data/piles.yml
          git config user.name "data-pile-handshake"
          git config user.email "data-pile-handshake@users.noreply.github.com"
          git add _data/piles.yml
          git commit -m "register pile ${GITHUB_REPOSITORY}"
          git push -u origin "$br"
          gh pr create --title "Register pile ${GITHUB_REPOSITORY}" \
            --body "Handshake: requesting aggregation. Inbound digests will be delivered to feed/atlas in this pile." \
            --base main --head "$br"
