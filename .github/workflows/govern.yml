name: govern

# Owner opt-in: apply this pile's per-question constitution to delivered data and publish
# a transparency report. Decrypts the verified feed (owner-only), judges every record
# against questions/<source>/<poll>.json — multichoice option-matches accepted
# mechanically; write-ins and open answers handed to bin/judge (or $DP_JUDGE_CMD) — and
# commits reports/govern-<source>-<stamp>.json to main. The report ties each verdict to the
# guidance in force (constitution_sha) and the signed manifest, so it stands as a proof.
#
# The needs-judgment rows are the batch a human or an agent resolves in parallel; re-run
# with DP_JUDGE_CMD pointed at that judge to fold the verdicts in.

on:
  workflow_dispatch:
    inputs:
      source:
        description: "Feed source to govern"
        default: tell

permissions:
  contents: write

concurrency:
  group: govern
  cancel-in-progress: false

jobs:
  govern:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install age
        run: sudo apt-get update && sudo apt-get install -y age
      - name: Decrypt, judge, and emit the transparency report
        env:
          PILE_AGE_IDENTITY: ${{ secrets.PILE_AGE_IDENTITY }}
          SRC: ${{ inputs.source }}
        run: |
          set -euo pipefail
          [ -n "${PILE_AGE_IDENTITY:-}" ] || { echo "::error::PILE_AGE_IDENTITY secret required (decrypt is owner-only)"; exit 1; }
          branch="$(awk -v s="$SRC" '$1=="-"&&$2=="name:"{c=$3} c==s&&$1=="branch:"{print $2;exit}' pile.yml)"
          git fetch --quiet origin "$branch" || { echo "no feed branch $branch yet"; exit 0; }
          work="$(mktemp -d)"
          git --work-tree="$work" checkout FETCH_HEAD -- inbox; git reset --quiet -- inbox
          report="$(bin/govern --dir "$work" --source "$SRC")"
          { echo "## govern $SRC"; echo '```'; jq -c '.counts' "$report"; echo '```'; } >> "$GITHUB_STEP_SUMMARY"
          git config user.name  "data-pile-govern"
          git config user.email "data-pile-govern@users.noreply.github.com"
          git add reports/govern-*.json
          git commit -m "govern: ${SRC} transparency report"
          git push
