# Identity of this data-pile. `setup.yml` fills the generated values; you fill the rest.
# This is the public face of the pile — no secrets live here. The private age identity
# lives only in the repo secret PILE_AGE_IDENTITY, never in the repository.

# Stable slug for this pile.
id: ""              # e.g. cd04-q1

# Region / namespace / scale this pile speaks for — whatever your CONSTITUTION declares,
# from "board of commissioners" to "water district 9" to "my D&D group". Negotiated when
# you open a join PR on a Tell.
scope: ""           # e.g. colorado

# The Tells you have joined. Each is an inbound source delivering to its own feed branch,
# independently encrypted. `signer` is the Tell's commit-signing fingerprint (filled when
# you join). A source marked `unsigned: true` is unauthenticated by design (the direct-QR
# path) — the acceptance governor is its only gate.
tells:
  - name: atlas        # PLACEHOLDER — replace with a Tell you actually joined.
    branch: feed/atlas
    signer: ""         # e.g. SHA256:xxxx…
  - name: direct       # the direct-QR ingress path; respondents age-encrypt to this pile.
    branch: feed/direct
    unsigned: true

# The questions this pile owns and solicits. Each lives under questions/<qid>/ and its
# guidance.json governs what answers are tolerated. `tells` lists which sources solicit it.
questions:
  - qid: ""            # e.g. cd04-q1; must match a questions/<qid>/ directory
    tells: [atlas, direct]

# age recipient — cross-checks keys/pile.age.pub. Set by setup.yml.
age_recipient: ""   # e.g. age1xxxx…

# Public URL of this repository, recorded when you join a Tell.
repo_url: ""        # e.g. https://github.com/<owner>/<repo>
